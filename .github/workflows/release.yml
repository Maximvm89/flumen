name: Release

# Push a version tag and GitHub builds the Windows installer and publishes the
# release automatically:  git tag v0.1.1 && git push origin v0.1.1
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write          # needed to create the GitHub Release

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history + tags so build.py's git describe stamps the version

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-gui.txt -r requirements-build.txt

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build bundle + installer
        run: python build.py --installer

      # Changelog from commit subjects since the previous tag. (GitHub's
      # generate_release_notes builds from merged PRs — we commit straight to
      # main, so that produces only a compare link.)
      - name: Build changelog
        shell: bash
        run: |
          PREV=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)
          {
            echo "Per-user Windows installer (no admin required)."
            echo
            echo "> The installer is **unsigned** — on first run Windows SmartScreen shows"
            echo "> \"Windows protected your PC\" → **More info → Run anyway**."
            echo
            echo "## What's changed"
            if [ -n "$PREV" ]; then
              git log "$PREV..${GITHUB_REF_NAME}" --no-merges --format='- %s'
              echo
              echo "**Full changelog**: https://github.com/$GITHUB_REPOSITORY/compare/$PREV...${GITHUB_REF_NAME}"
            else
              git log --no-merges --format='- %s'
            fi
          } > release_body.md
          cat release_body.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Flumen ${{ github.ref_name }}
          files: dist/Flumen-Setup-*.exe
          fail_on_unmatched_files: true
          body_path: release_body.md

      # Announce the release in Discord. Free: a channel webhook + this step.
      # No-op until the DISCORD_WEBHOOK secret is set (Server Settings ->
      # Integrations -> Webhooks -> copy URL; then `gh secret set DISCORD_WEBHOOK`).
      - name: Announce on Discord
        if: success()
        shell: bash
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK not set - skipping announcement."
            exit 0
          fi
          # Pull the published release (body now includes the auto changelog).
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" \
            --json body,url,name > release.json
          jq -n --slurpfile r release.json --arg tag "$TAG" '
            {
              username: "Flumen Releases",
              embeds: [{
                title: $r[0].name,
                url: $r[0].url,
                description: ($r[0].body | if length > 3500
                              then .[:3500] + "\n…(truncated)" else . end),
                color: 9109504,
                footer: {text: "Download: Flumen-Setup-\($tag | ltrimstr("v")).exe"}
              }]
            }' > payload.json
          curl -sf -H "Content-Type: application/json" \
               -d @payload.json "$DISCORD_WEBHOOK" \
            && echo "Announced $TAG on Discord." \
            || echo "warning: Discord announce failed (release still published)."
